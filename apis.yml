aid: hello-retail
name: Hello Retail
description: >-
  Hello Retail is a personalization and product recommendation platform for
  e-commerce. It provides a REST API and JavaScript SDK for integrating
  personalized product recommendations, search, and behavioral tracking into
  retail websites.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - E-Commerce
  - Personalization
  - Product Recommendations
  - Retail
