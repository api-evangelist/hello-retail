apis:
  - aid: hello-retail:hello-retail-api
    name: Hello Retail API
    description: >-
      Hello Retail provides a REST API that allows using the personalization
      features and tracking programmatically. The helloretail.js script
      provides an SDK that is an easy-to-use way of using the API from
      JavaScript directly on the website.
    humanURL: https://developer.helloretail.com/sdk/
