  https://raw.githubusercontent.com/api-evangelist/hello-retail/refs/heads/main/apis.yml
created: '2025-02-06'
modified: '2026-04-28'
specificationVersion: '0.19'
apis:
  - aid: hello-retail:hello-retail-api
    name: Hello Retail API
    description: >-
      Hello Retail provides a REST API for personalized product
      recommendations, on-site search, page-driven product listings, and
      customer bias retrieval. The helloretail.js script wraps the API as
      an easy-to-use JavaScript SDK for use directly on retail websites.
    humanURL: https://developer.helloretail.com/sdk/
    baseURL: https://core.helloretail.com
    tags:
      - E-Commerce
      - Personalization
      - REST
    properties:
